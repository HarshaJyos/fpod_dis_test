<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshPod - Transaction Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --failed-bg: #fee2e2;
            --failed-text: #b91c1c;
            --warning-bg: #fef3c7;
            --warning-text: #b45309;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: none; /* Hidden by default until auth completes */
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 4px;
            font-family: 'Inter', sans-serif;
        }
        .actions-bar {
            display: flex;
            gap: 12px;
        }
        .btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn-secondary {
            background-color: #ffffff;
            color: var(--text-secondary);
            border: 1px solid #cbd5e1;
        }
        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }
        .btn-logout {
            background-color: #ef4444;
        }
        .btn-logout:hover {
            background-color: #dc2626;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }
        .settings-card {
            margin-bottom: 24px;
        }
        .alert {
            background-color: var(--success-bg);
            color: var(--success-text);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(21, 128, 61, 0.15);
            font-family: 'Inter', sans-serif;
            display: none;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-group label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .input-field {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 100px;
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: border-color 0.15s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }
        th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            background-color: #f8fafc;
            font-weight: 600;
        }
        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background-color: #f8fafc;
        }
        .tx-id {
            font-family: monospace;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-captured {
            background-color: var(--success-bg);
            color: var(--success-text);
        }
        .badge-failed {
            background-color: var(--failed-bg);
            color: var(--failed-text);
        }
        .badge-authorized {
            background-color: var(--warning-bg);
            color: var(--warning-text);
        }
        .badge-other {
            background-color: #f1f5f9;
            color: var(--text-secondary);
        }
        .amount {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .contact-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>FreshPod Transaction Dashboard</h1>
                <div class="subtitle">Live payment records retrieved from Razorpay</div>
            </div>
            <div class="actions-bar">
                <a href="/api/payments/export" class="btn btn-secondary">Export to CSV (Excel)</a>
                <button id="logoutBtn" class="btn btn-logout">Log Out</button>
            </div>
        </header>

        <!-- Dynamic Success Alert -->
        <div id="successAlert" class="alert">Kiosk payment settings updated successfully in Firestore. Cached session has been cleared.</div>

        <!-- Kiosk Settings -->
        <div class="card settings-card">
            <form id="settingsForm" class="input-group">
                <label for="amount">Payment Price (INR):</label>
                <input type="number" id="amount" min="1" step="1" required class="input-field">
                <button type="submit" id="submitBtn" class="btn">Update Price</button>
            </form>
        </div>

        <!-- Transactions Table -->
        <div class="card">
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Payment ID</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Contact</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-secondary);">Loading transaction logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase Script Configuration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA03ON8h3-Txnn12LsqwinTZMzDbddd1nc",
            authDomain: "freshpod-901ed.firebaseapp.com",
            projectId: "freshpod-901ed",
            storageBucket: "freshpod-901ed.firebasestorage.app",
            messagingSenderId: "209820777199",
            appId: "1:209820777199:web:2ac6487aad0df9b521b91a",
            measurementId: "G-K2G9M145ZH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const settingsForm = document.getElementById("settingsForm");
        const amountInput = document.getElementById("amount");
        const submitBtn = document.getElementById("submitBtn");
        const successAlert = document.getElementById("successAlert");
        const logoutBtn = document.getElementById("logoutBtn");
        const tableBody = document.getElementById("tableBody");

        // Protect page: redirect if not logged in
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "/login";
            } else {
                document.body.style.display = "block";
                await loadConfig();
                await loadTransactions();
            }
        });

        // Logout event
        logoutBtn.addEventListener("click", async () => {
            await signOut(auth);
            window.location.href = "/login";
        });

        // Load Kiosk settings from Firestore
        async function loadConfig() {
            try {
                const configRef = doc(db, "config", "kiosk");
                const docSnap = await getDoc(configRef);
                if (docSnap.exists()) {
                    amountInput.value = docSnap.data().amount || 50;
                } else {
                    amountInput.value = 50;
                }
            } catch (err) {
                console.error("Failed to load settings:", err);
            }
        }

        // Load Transactions from Server
        async function loadTransactions() {
            try {
                const res = await fetch("/api/payments/all");
                if (!res.ok) throw new Error("Failed to load transactions");
                const payments = await res.json();
                
                if (payments.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No transactions found.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = payments.map(p => {
                    const date = new Date(p.created_at * 1000).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                    const amount = (p.amount / 100).toFixed(2);
                    const statusClass = p.status === 'captured' ? 'captured' : (p.status === 'failed' ? 'failed' : (p.status === 'authorized' ? 'authorized' : 'other'));
                    const contact = p.contact || p.email || 'N/A';
                    return `
                        <tr>
                            <td>${date}</td>
                            <td class="tx-id">${p.id}</td>
                            <td class="amount">₹${amount}</td>
                            <td style="text-transform: capitalize;">${p.method}</td>
                            <td><span class="badge badge-${statusClass}">${p.status}</span></td>
                            <td class="contact-info">${contact}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error("Failed to load transactions:", err);
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--failed-text);">Failed to load transactions list. Check connection.</td></tr>`;
            }
        }

        // Form submission: Update Firestore directly!
        settingsForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            successAlert.style.display = "none";
            
            // Set loading state UI
            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";
            submitBtn.style.opacity = "0.7";
            submitBtn.style.cursor = "not-allowed";
            amountInput.readOnly = true;

            const newAmount = parseInt(amountInput.value);

            try {
                const configRef = doc(db, "config", "kiosk");
                await setDoc(configRef, {
                    amount: newAmount,
                    updatedAt: Date.now()
                }, { merge: true });

                // Success visual display state
                successAlert.style.display = "block";
                setTimeout(() => {
                    successAlert.style.display = "none";
                }, 5000);
            } catch (err) {
                console.error("Failed to update config in Firestore:", err);
                alert("Failed to update settings. Verify Firestore Security Rules.");
            } finally {
                // Restore submit controls
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Price";
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";
                amountInput.readOnly = false;
            }
        });
    </script>
</body>
</html>
